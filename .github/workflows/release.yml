name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Python runtime
        run: npm run prepare:python
        continue-on-error: true

      - name: Prepare FFmpeg
        run: npm run prepare:ffmpeg
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Package installer (NSIS)
        run: npm run dist

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.yml
          fail_on_unmatched_files: false
          generate_release_notes: true
