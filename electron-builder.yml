appId: com.wintoolbox.app
productName: Win Toolbox

directories:
  output: dist
  buildResources: build

files:
  - "out/**/*"
  - "package.json"
  - "!node_modules/sharp/**/*"   # sharp not used (replaced by jimp)

extraResources:
  - from: "plugins"
    to: "plugins"
    filter: ["**/*"]
  - from: "python-runtime"
    to: "python-runtime"
    filter: ["**/*"]
  - from: "resources/ffmpeg"
    to: "resources/ffmpeg"
    filter: ["**/*"]

# jimp 解包到 asar 外（pure JS 但用了大量小文件，需要 fs 读取）
asarUnpack:
  - "node_modules/jimp/**/*"
  - "node_modules/@jimp/**/*"
  - "node_modules/pngjs/**/*"
  - "node_modules/omggif/**/*"
  - "node_modules/@babel/runtime/**/*"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Win Toolbox
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico

asar: true
compression: maximum
